name: Common_CI

on:
  workflow_call:
    inputs:
      working_directory:
        required: true
        type: string
      image_name:
        required: true
        type: string
      run_build:
        required: false
        type: boolean
        default: false
      sonar_project_key:
        required: true
        type: string
      docker_context:
        required: false
        type: string
        default: '.'
      dockerfile_path:
        required: false
        type: string
        default: ''
      service-name:
        required: true
        type: string
      helm_repo:
        required: false
        type: string
        default: ''
      helm_chart_path:
        required: false
        type: string
        default: ''
      values_file:
        required: false
        type: string
        default: 'values.yaml'
      helm_service_key:
        required: false
        type: string
        default: ''

    secrets:
      SONAR_TOKEN:
        required: true
      SONAR_HOST_URL:
        required: true
      SNYK_TOKEN:
        required: true
      DOCKER_USERNAME:
        required: true
      DOCKER_PASSWORD:
        required: true
      SMTP_HOST:
        required: true
      SMTP_PORT:
        required: true
      SMTP_USERNAME:
        required: true
      SMTP_PASSWORD:
        required: true
      EMAIL_TO:
        required: true
      HELM_REPO_TOKEN:
        required: false

# ──────────────────────────────────────────────────────────────────────────────
# JOB GRAPH:
#
#   prepare
#     ├── test ─────────────┐
#     ├── sonar ────────────┼──► build ──► trivy ──► push ──► update-helm ──► notify
#     └── snyk  ────────────┘
#
# ──────────────────────────────────────────────────────────────────────────────
jobs:

  # ── JOB 1: PREPARE ──────────────────────────────────────────────────────────
  prepare:
    name: "Prepare"
    runs-on: ubuntu-latest
    permissions:
      contents: write

    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    outputs:
      tag:  ${{ steps.image_tag.outputs.tag }}
      push: ${{ steps.image_tag.outputs.push }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles(format('{0}/package.json', inputs.working_directory)) }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Calculate Semantic Version  # ← CHANGED: runs on Dev-Branch too
        id: semver
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/Dev_branch'
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ github.token }}
          dry_run: true
          default_bump: patch
          tag_prefix: 'v'

      - name: Resolve Image Tag
        id: image_tag
        run: |
          # ← CHANGED: push=true on Dev-Branch too
          if [[ "${{ github.ref }}" == "refs/heads/main" || "${{ github.ref }}" == "refs/heads/Dev_branch" ]]; then
            echo "tag=${{ steps.semver.outputs.new_tag }}" >> $GITHUB_OUTPUT
            echo "push=true"                               >> $GITHUB_OUTPUT
          else
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            echo "tag=sha-${SHORT_SHA}"                    >> $GITHUB_OUTPUT
            echo "push=false"                              >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci || npm install

  # ── JOB 2: TEST ─────────────────────────────────────────────────────────────
  test:
    name: "Test"
    runs-on: ubuntu-latest
    needs: prepare

    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore npm cache
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles(format('{0}/package.json', inputs.working_directory)) }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run Tests
        run: npm test --if-present

  # ── JOB 3: SONAR ────────────────────────────────────────────────────────────
  sonar:
    name: "SonarQube"
    runs-on: ubuntu-latest
    needs: prepare

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          projectBaseDir: .
          args: >
            -Dsonar.projectKey=${{ inputs.sonar_project_key }}
            -Dsonar.projectName=${{ inputs.sonar_project_key }}
            -Dsonar.qualitygate.wait=true
            -Dsonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**,**/*.test.js,**/*.spec.js,**/*.min.js
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Quality Gate Check
        uses: SonarSource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  # ── JOB 4: SNYK ─────────────────────────────────────────────────────────────
  snyk:
    name: "Snyk Security"
    runs-on: ubuntu-latest
    needs: prepare

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore npm cache
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles(format('{0}/package.json', inputs.working_directory)) }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        working-directory: ${{ inputs.working_directory }}
        run: npm ci || npm install

      - name: Snyk Scan
        uses: snyk/actions/node@0.4.0
        with:
          command: test
          args: --file=${{ inputs.working_directory }}/package.json --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  # ── JOB 5: BUILD ────────────────────────────────────────────────────────────
  build:
    name: "Docker Build"
    runs-on: ubuntu-latest
    needs: [prepare, test, sonar, snyk]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js (frontend builds only)
        if: inputs.run_build == true
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore npm cache (frontend builds only)
        if: inputs.run_build == true
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles(format('{0}/package.json', inputs.working_directory)) }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies (frontend builds only)
        if: inputs.run_build == true
        working-directory: ${{ inputs.working_directory }}
        run: npm ci || npm install

      - name: Build frontend
        if: inputs.run_build == true
        working-directory: ${{ inputs.working_directory }}
        run: npm run build

      - name: Resolve Dockerfile Path
        id: dockerfile
        run: |
          DOCKERFILE="${{ inputs.dockerfile_path }}"
          if [ -z "$DOCKERFILE" ]; then
            DOCKERFILE="${{ inputs.image_name }}/Dockerfile"
          fi
          echo "path=$DOCKERFILE" >> $GITHUB_OUTPUT

      - name: Build Docker Image
        working-directory: ${{ inputs.docker_context }}
        run: |
          docker build \
            -f "${{ steps.dockerfile.outputs.path }}" \
            -t ${{ secrets.DOCKER_USERNAME }}/${{ inputs.service-name }}:${{ needs.prepare.outputs.tag }} \
            .

      - name: Save image as tar artifact
        run: |
          docker save \
            ${{ secrets.DOCKER_USERNAME }}/${{ inputs.service-name }}:${{ needs.prepare.outputs.tag }} \
            -o /tmp/docker-image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ inputs.service-name }}
          path: /tmp/docker-image.tar
          retention-days: 1

  # ── JOB 6: TRIVY ────────────────────────────────────────────────────────────
  trivy:
    name: "Trivy Image Scan"
    runs-on: ubuntu-latest
    needs: [prepare, build]

    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image-${{ inputs.service-name }}
          path: /tmp

      - name: Load Docker image
        run: docker load -i /tmp/docker-image.tar

      - name: Trivy Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKER_USERNAME }}/${{ inputs.service-name }}:${{ needs.prepare.outputs.tag }}'
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: CRITICAL

  # ── JOB 7: PUSH ─────────────────────────────────────────────────────────────
  push:
    name: "Docker Push"
    runs-on: ubuntu-latest
    needs: [prepare, trivy]

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image-${{ inputs.service-name }}
          path: /tmp

      - name: Load Docker image
        run: docker load -i /tmp/docker-image.tar

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker Image (semver + latest)
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ inputs.service-name }}:${{ needs.prepare.outputs.tag }}
          docker tag  ${{ secrets.DOCKER_USERNAME }}/${{ inputs.service-name }}:${{ needs.prepare.outputs.tag }} \
                      ${{ secrets.DOCKER_USERNAME }}/${{ inputs.service-name }}:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ inputs.service-name }}:latest

      - name: Create Git Tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ github.token }}
          custom_tag: ${{ needs.prepare.outputs.tag }}
          tag_prefix: ''

  # ── JOB 8: UPDATE HELM VALUES ────────────────────────────────────────────────
  update-helm:
    name: "Update Helm Values"
    runs-on: ubuntu-latest
    needs: [prepare, push]
    if: |
      github.ref == 'refs/heads/main' || github.ref == 'refs/heads/Dev_branch'

    permissions:
      contents: write

    steps:
      - name: Checkout Helm Repository
        if: inputs.helm_repo != ''
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.helm_repo }}
          path: helm-repo
          token: ${{ secrets.HELM_REPO_TOKEN }}

      - name: Install yq
        if: inputs.helm_repo != ''
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Determine Values File
        if: inputs.helm_repo != ''
        id: values_file
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "file=values-main.yaml" >> $GITHUB_OUTPUT
          else
            echo "file=${{ inputs.values_file }}" >> $GITHUB_OUTPUT
          fi

      - name: Update Values File
        if: inputs.helm_repo != '' && inputs.helm_chart_path != '' && inputs.helm_service_key != ''
        working-directory: helm-repo
        run: |
          VALUES_PATH="${{ inputs.helm_chart_path }}/${{ steps.values_file.outputs.file }}"
          SERVICE_KEY="${{ inputs.helm_service_key }}"
          NEW_TAG="${{ needs.prepare.outputs.tag }}"

          echo "Updating $VALUES_PATH - $SERVICE_KEY.tag = $NEW_TAG"

          # Update the tag value in the values file
          yq eval ".${SERVICE_KEY}.tag = \"${NEW_TAG}\"" -i "$VALUES_PATH"

          # Show the updated section
          yq eval ".${SERVICE_KEY}.tag" "$VALUES_PATH"

      - name: Commit and Push Changes
        if: inputs.helm_repo != '' && inputs.helm_chart_path != '' && inputs.helm_service_key != ''
        working-directory: helm-repo
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add "${{ inputs.helm_chart_path }}/${{ steps.values_file.outputs.file }}"
          git commit -m "chore: update ${{ inputs.service-name }} tag to ${{ needs.prepare.outputs.tag }}" || echo "No changes to commit"
          git push

  # ── JOB 9: CREATE RELEASE ──────────────────────────────────────────────────
  create-release:
    name: "Create GitHub Release"
    needs: [prepare, test, sonar, snyk, build, trivy, push]
    if: |
      always() &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/Dev_branch') &&
      needs.push.result == 'success'
    runs-on: ubuntu-latest                # ← CHANGED: added Dev-Branch condition

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: Release ${{ needs.prepare.outputs.tag }}
          body: |
            Release of ${{ inputs.service-name }}
            Version: ${{ needs.prepare.outputs.tag }}
            Image: ${{ secrets.DOCKER_USERNAME }}/${{ inputs.service-name }}:${{ needs.prepare.outputs.tag }}
          generate_release_notes: true

  # ── JOB 10: NOTIFY ──────────────────────────────────────────────────────────
  notify:
    name: "Notify"
    runs-on: ubuntu-latest
    needs: [prepare, test, sonar, snyk, build, trivy, push, update-helm, create-release]
    if: always() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/Dev_branch')
    # ← CHANGED: added Dev-Branch condition

    steps:
      - name: Send Email (Success)
        if: ${{ !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "CI Success - ${{ inputs.service-name }} ${{ needs.prepare.outputs.tag }}"
          body: |
            Build Successful

            Service:      ${{ inputs.service-name }}
            Tag:          ${{ needs.prepare.outputs.tag }}
            Image:        ${{ secrets.DOCKER_USERNAME }}/${{ inputs.service-name }}:${{ needs.prepare.outputs.tag }}
            Repository:   ${{ github.repository }}
            Triggered By: ${{ github.actor }}
          to: ${{ secrets.EMAIL_TO }}
          from: GitHub Actions

      - name: Send Email (Failure)
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "CI Failed - ${{ inputs.service-name }} - Run #${{ github.run_number }}"
          body: |
            CI Pipeline Execution Failed

            Service:       ${{ inputs.service-name }}
            Tag Attempted: ${{ needs.prepare.outputs.tag }}
            Repository:    ${{ github.repository }}
            Branch:        ${{ github.ref_name }}
            Triggered By:  ${{ github.actor }}
            Logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          to: ${{ secrets.EMAIL_TO }}
          from: GitHub Actions
